name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: campus
          POSTGRES_PASSWORD: campus
          POSTGRES_DB: campus_connect
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U campus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://campus:campus@localhost:5432/campus_connect
      JWT_SECRET: ci_test_secret_at_least_32_characters_long_xxxx
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --skip-generate
      - run: npm test
