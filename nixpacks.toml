# Force the production start sequence: sync schema, seed reference data
# (idempotent, non-blocking), then boot the API. Railway/Nixpacks reads this at
# build time, which also reliably busts the build cache when it changes.
[start]
cmd = "npx prisma db push --skip-generate --accept-data-loss && (node prisma/seed.js || true) && node src/index.js"
